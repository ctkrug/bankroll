<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bankroll — Monte-Carlo bankroll simulator</title>
  <meta name="description" content="Set your edge, win rate, and bet size, then run 10,000 Monte-Carlo equity paths to see your real risk of ruin." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230a1420'/%3E%3Cpath d='M6 24 L12 14 L18 20 L26 8' stroke='%2340c4ff' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <span class="wordmark"><span class="wordmark-glyph" aria-hidden="true">&#9670;</span>bankroll</span>
      <p class="tagline">live monte-carlo risk of ruin</p>
    </header>

    <main class="layout">
      <section class="control-panel" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="panel-heading">Controls</h2>

        <div class="control">
          <div class="control-label-row">
            <label for="win-prob">Win probability</label>
            <output for="win-prob" id="win-prob-value" class="control-value mono">55%</output>
          </div>
          <input type="range" id="win-prob" min="1" max="99" step="1" value="55" />
        </div>

        <div class="control">
          <div class="control-label-row">
            <label for="payout-ratio">Payout ratio</label>
            <output for="payout-ratio" id="payout-ratio-value" class="control-value mono">1.0 : 1</output>
          </div>
          <input type="range" id="payout-ratio" min="0.2" max="5" step="0.1" value="1" />
        </div>

        <div class="control">
          <div class="control-label-row">
            <label for="bet-fraction">Bet size</label>
            <output for="bet-fraction" id="bet-fraction-value" class="control-value mono">10%</output>
          </div>
          <input type="range" id="bet-fraction" min="0" max="100" step="1" value="10" />
        </div>

        <div class="kelly-row">
          <button type="button" id="kelly-toggle" class="toggle" role="switch" aria-checked="false">
            <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
            <span>Snap to Kelly</span>
          </button>
          <p class="kelly-readout mono" id="kelly-readout">Kelly-optimal —% &middot; ruin at Kelly —%</p>
        </div>

        <div class="control">
          <div class="control-label-row">
            <label for="num-paths">Simulated paths</label>
            <output for="num-paths" id="num-paths-value" class="control-value mono">10,000</output>
          </div>
          <input type="range" id="num-paths" min="1000" max="10000" step="1000" value="10000" />
        </div>

        <div class="control">
          <div class="control-label-row">
            <label for="num-bets">Bets per path</label>
            <output for="num-bets" id="num-bets-value" class="control-value mono">100</output>
          </div>
          <input type="range" id="num-bets" min="0" max="500" step="10" value="100" />
        </div>

        <p class="compute-time mono" id="compute-time"></p>
      </section>

      <section class="chart-hero" aria-labelledby="chart-heading">
        <h2 id="chart-heading" class="sr-only">Equity fan chart</h2>
        <div class="counter-chip" id="counter-chip">
          <span class="counter-label">Risk of ruin</span>
          <span class="counter-value mono" id="ruin-value" role="status" aria-live="polite">&mdash;</span>
        </div>
        <canvas id="fan-canvas"></canvas>
        <div class="sweep" id="sweep" aria-hidden="true"></div>
        <ul class="legend mono" id="legend"></ul>
      </section>
    </main>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
